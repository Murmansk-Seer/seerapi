name: Build Alias DB

on:
    workflow_run:
        workflows: ["Sync Upstream"]
        types: [completed]
    push:
        branches: [main]
        paths:
            - "tables/*.csv"
            - "scripts/build_alias_db.py"
            - ".github/workflows/build-alias-db.yml"
    workflow_dispatch:

jobs:
    build:
        if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Build alias database
              run: python scripts/build_alias_db.py

            - name: Generate SHA256 checksum
              run: sha256sum aliases-data.sqlite > aliases-data.sqlite.sha256

            - name: Upload to Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: alias-db-latest
                  name: Alias Database
                  make_latest: false
                  body: |
                      Automatically built alias SQLite database for IronsBot.

                      Source: `tables/*.csv`
                      Commit: ${{ github.sha }}
                  files: |
                      aliases-data.sqlite
                      aliases-data.sqlite.sha256
