name: Sync Upstream

on:
  schedule:
    - cron: "30 19 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream main
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/SeerAPI/seerapi.git || git remote set-url upstream https://github.com/SeerAPI/seerapi.git
          git fetch upstream main
          if git merge -X theirs -m "Sync upstream seerapi 同步上游 SeerAPI" upstream/main; then
            git push origin main
            exit 0
          fi

          conflicts="$(git diff --name-only --diff-filter=U)"
          if [ -z "$conflicts" ]; then
            echo "Merge failed without unresolved file conflicts."
            git status --short
            exit 1
          fi

          echo "$conflicts" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Taking upstream version for conflicted file: $file"
            if git checkout --theirs -- "$file" 2>/dev/null; then
              git add -- "$file"
            else
              git rm -f --ignore-unmatch -- "$file"
            fi
          done

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain:"
            git diff --name-only --diff-filter=U
            exit 1
          fi

          git commit --no-edit
          git push origin main
