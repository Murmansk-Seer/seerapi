name: Build IronsBot Data DB

on:
  workflow_run:
    workflows: ["Sync Upstream"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "scripts/build_ironsbot_data_db.py"
      - ".github/workflows/build-ironsbot-data-db.yml"
  schedule:
    - cron: "5 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        type: boolean
        description: "Force rebuild even when api-data release is unchanged"
        required: false
        default: false

concurrency:
  group: ironsbot-data-build
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check data source changes
        id: source_check
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force == true }}
          PARTNER_CONTRACTS_URL: https://raw.githubusercontent.com/Murmansk-Seer/config-sources/main/unity/partner_contracts.json
          UNITY_ITEM_CATALOG_URL: https://raw.githubusercontent.com/Murmansk-Seer/config-sources/main/unity/itemsOptimizeCatItems17.json
          SPECIAL_EFFECT_STATUS_URL: https://raw.githubusercontent.com/Murmansk-Seer/config-sources/main/unity/signIconFight.json
        run: |
          set -e
          remote_sha="$(
            curl -fsSL https://github.com/Murmansk-Seer/api-data/releases/download/latest/seerapi-data.sqlite.sha256 \
              | awk '{print $1}'
          )"
          remote_partner_sha="$(
            curl -fsSL "${PARTNER_CONTRACTS_URL}" | sha256sum | awk '{print $1}'
          )"
          remote_item_catalog_sha="$(
            curl -fsSL "${UNITY_ITEM_CATALOG_URL}" | sha256sum | awk '{print $1}'
          )"
          remote_special_effect_status_sha="$(
            curl -fsSL "${SPECIAL_EFFECT_STATUS_URL}" | sha256sum | awk '{print $1}'
          )"
          previous_sha=""
          previous_partner_sha=""
          previous_item_catalog_sha=""
          previous_special_effect_status_sha=""
          if [ -f .build-state/api-data-sha256 ]; then
            previous_sha="$(cat .build-state/api-data-sha256)"
          fi
          if [ -f .build-state/partner-contracts-sha256 ]; then
            previous_partner_sha="$(cat .build-state/partner-contracts-sha256)"
          fi
          if [ -f .build-state/unity-item-catalog-sha256 ]; then
            previous_item_catalog_sha="$(cat .build-state/unity-item-catalog-sha256)"
          fi
          if [ -f .build-state/special-effect-status-sha256 ]; then
            previous_special_effect_status_sha="$(cat .build-state/special-effect-status-sha256)"
          fi

          echo "remote_sha=${remote_sha}" >> "$GITHUB_OUTPUT"
          echo "previous_sha=${previous_sha}" >> "$GITHUB_OUTPUT"
          echo "remote_partner_sha=${remote_partner_sha}" >> "$GITHUB_OUTPUT"
          echo "previous_partner_sha=${previous_partner_sha}" >> "$GITHUB_OUTPUT"
          echo "remote_item_catalog_sha=${remote_item_catalog_sha}" >> "$GITHUB_OUTPUT"
          echo "previous_item_catalog_sha=${previous_item_catalog_sha}" >> "$GITHUB_OUTPUT"
          echo "remote_special_effect_status_sha=${remote_special_effect_status_sha}" >> "$GITHUB_OUTPUT"
          echo "previous_special_effect_status_sha=${previous_special_effect_status_sha}" >> "$GITHUB_OUTPUT"

          if [ "${FORCE}" != "true" ] && [ "${GITHUB_EVENT_NAME}" != "push" ] && [ -n "${previous_sha}" ] && [ -n "${previous_partner_sha}" ] && [ -n "${previous_item_catalog_sha}" ] && [ -n "${previous_special_effect_status_sha}" ] && [ "${remote_sha}" = "${previous_sha}" ] && [ "${remote_partner_sha}" = "${previous_partner_sha}" ] && [ "${remote_item_catalog_sha}" = "${previous_item_catalog_sha}" ] && [ "${remote_special_effect_status_sha}" = "${previous_special_effect_status_sha}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "api-data release, official partner contracts, Unity item catalog, and special effect statuses are unchanged; skipping IronsBot DB build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Build required: force=${FORCE}, event=${GITHUB_EVENT_NAME}, api-data=${remote_sha}/${previous_sha:-none}, partner-contracts=${remote_partner_sha}/${previous_partner_sha:-none}, unity-item-catalog=${remote_item_catalog_sha}/${previous_item_catalog_sha:-none}, special-effect-status=${remote_special_effect_status_sha}/${previous_special_effect_status_sha:-none}"
          fi

      - name: Skip unchanged build
        if: steps.source_check.outputs.skip == 'true'
        run: echo "No api-data release changes; workflow succeeded without rebuilding."

      - name: Setup Python
        if: steps.source_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Java
        if: steps.source_check.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install parser dependency
        if: steps.source_check.outputs.skip != 'true'
        run: python -m pip install UnityPy

      - name: Install FFDec SWF renderer
        if: steps.source_check.outputs.skip != 'true'
        run: |
          curl -fsSL \
            -o /tmp/ffdec.zip \
            https://github.com/jindrapetrik/jpexs-decompiler/releases/download/version26.2.1/ffdec_26.2.1.zip
          echo "0333b56998a55bd83f4e0deb678a811fcdc45607582b4f5dd438309c8c3ad5ce  /tmp/ffdec.zip" \
            | sha256sum --check
          sudo mkdir -p /opt/ffdec
          sudo unzip -q /tmp/ffdec.zip -d /opt/ffdec
          test -f /opt/ffdec/ffdec.jar
          echo "IRONSBOT_DATA_EFFECT_ICON_PNG_RENDER_FFDEC_JAR=/opt/ffdec/ffdec.jar" \
            >> "$GITHUB_ENV"

      - name: Restore effect icon PNG cache
        if: steps.source_check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: .cache/effect-icon-png
          key: ${{ runner.os }}-effect-icon-png-sprite-v1-${{ steps.source_check.outputs.remote_special_effect_status_sha }}
          restore-keys: |
            ${{ runner.os }}-effect-icon-png-sprite-v1-

      - name: Build IronsBot database
        if: steps.source_check.outputs.skip != 'true'
        env:
          IRONSBOT_DATA_EFFECT_ICON_PNG_CACHE_DIR: .cache/effect-icon-png
          IRONSBOT_DATA_EFFECT_ICON_PNG_COMPOSITE_RENDER_TIMEOUT_SECONDS: "12"
          IRONSBOT_DATA_EFFECT_ICON_PNG_SHAPE_RENDER_TIMEOUT_SECONDS: "20"
        run: python scripts/build_ironsbot_data_db.py

      - name: Generate SHA256 checksum
        if: steps.source_check.outputs.skip != 'true'
        run: sha256sum ironsbot-data.sqlite > ironsbot-data.sqlite.sha256

      - name: Record data source checksums
        if: steps.source_check.outputs.skip != 'true'
        run: |
          set -e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p .build-state
          printf '%s\n' "${{ steps.source_check.outputs.remote_sha }}" > .build-state/api-data-sha256
          printf '%s\n' "${{ steps.source_check.outputs.remote_partner_sha }}" > .build-state/partner-contracts-sha256
          printf '%s\n' "${{ steps.source_check.outputs.remote_item_catalog_sha }}" > .build-state/unity-item-catalog-sha256
          printf '%s\n' "${{ steps.source_check.outputs.remote_special_effect_status_sha }}" > .build-state/special-effect-status-sha256
          git add .build-state/api-data-sha256 .build-state/partner-contracts-sha256 .build-state/unity-item-catalog-sha256 .build-state/special-effect-status-sha256
          if ! git diff --cached --quiet; then
            git commit -m "Record IronsBot data source checksums"
            git push origin main
          fi

      - name: Upload to Release
        if: steps.source_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ironsbot-data-latest
          name: IronsBot Data DB
          make_latest: false
          body: |
            IronsBot full runtime data database.

            This database is built from the Murmansk-Seer/api-data SQLite plus
            IronsBot custom tables parsed from official Seer Unity
            ConfigPackage data, Murmansk-Seer/seer-unity-config-parser JSON,
            and weekly preview metadata.

            Last build commit: ${{ github.sha }}
            Source api-data sha256: ${{ steps.source_check.outputs.remote_sha }}
            Source partner contracts sha256: ${{ steps.source_check.outputs.remote_partner_sha }}
            Source Unity item catalog sha256: ${{ steps.source_check.outputs.remote_item_catalog_sha }}
            Source special effect statuses sha256: ${{ steps.source_check.outputs.remote_special_effect_status_sha }}
          files: |
            ironsbot-data.sqlite
            ironsbot-data.sqlite.sha256
